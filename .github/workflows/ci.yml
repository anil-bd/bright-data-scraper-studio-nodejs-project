name: CI

on:
  pull_request:
  push:
    branches: [main]

jobs:
  validate:
    name: Validate
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '18'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Syntax check
        run: node --check index.js

      - name: Smoke run (no credentials)
        # Verifies the script gates correctly on missing config
        # and prints the friendly error before exiting cleanly.
        run: node index.js
        env:
          BRIGHT_DATA_API_TOKEN: ''
          BRIGHT_DATA_COLLECTOR_ID: ''
